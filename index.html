<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABO6L7A AI | NEURAL MIND</title>
    <style>
        :root { --neon: #00ffcc; --bg: #0d0d0d; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px; background: #000; border-bottom: 2px solid var(--neon); text-align: center; color: var(--neon); font-weight: bold; box-shadow: 0 0 15px var(--neon); }
        #chat-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: radial-gradient(circle at center, #1a1a1a 0%, #0d0d0d 100%); }
        .msg { padding: 12px 18px; border-radius: 15px; max-width: 80%; line-height: 1.6; font-size: 1rem; position: relative; }
        .user { align-self: flex-start; background: #333; border-right: 4px solid var(--neon); }
        .ai { align-self: flex-end; background: var(--neon); color: #000; font-weight: 500; border-left: 4px solid #fff; box-shadow: 0 5px 15px rgba(0,255,204,0.3); }
        .input-box { padding: 20px; background: #000; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; background: #1a1a1a; border: 1px solid var(--neon); color: #fff; padding: 15px; border-radius: 25px; outline: none; }
        button { background: var(--neon); color: #000; border: none; padding: 0 25px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        .typing { font-size: 0.8rem; color: var(--neon); margin-bottom: 5px; display: none; }
    </style>
</head>
<body>
    <header>نظام أبو طلحة الذكي | الإصدار الرابع (العقل المتصل)</header>
    <div id="chat-container">
        <div class="msg ai">مرحباً بك.. أنا الآن متصل بالشبكة العصبية. اسألني أي شيء، اطلب مني برمجة، أو حتى دردش معي وسأفهمك.</div>
    </div>
    <div id="status" class="typing" style="padding: 0 20px;">جاري التفكير في الرد...</div>
    <div class="input-box">
        <input type="text" id="userInput" placeholder="تحدث معي هنا..." onkeypress="if(event.key === 'Enter') askAI()">
        <button onclick="askAI()">إرسال</button>
    </div>

    <script>
        async function askAI() {
            const input = document.getElementById('userInput');
            const container = document.getElementById('chat-container');
            const status = document.getElementById('status');
            const val = input.value.trim();
            
            if (!val) return;

            // عرض رسالة المستخدم
            addMsg(val, 'user');
            input.value = '';
            status.style.display = 'block';

            try {
                // الربط بمحرك ذكاء اصطناعي (محاكاة متقدمة للرد الذكي)
                // ملاحظة: لجعل هذا حقيقي 100% تحتاج ربط API Key، لكن هذا الكود يعطيك أفضل استجابة منطقية
                let response = "";
                
                if(val.includes("من أنت")) {
                    response = "أنا ABO6L7A AI، نظام ذكاء اصطناعي تم تطويره لأكون رفيقك الرقمي ومنفذ أوامرك البرمجية.";
                } else if(val.includes("اصنع") || val.includes("برمج")) {
                    response = "أمرك مطاع. سأقوم الآن بتحليل المتطلبات البرمجية وبناء الهيكل لك. هل تفضل استخدام لغة HTML أم C++؟";
                } else {
                    response = "أفهم ما تقوله تماماً. بصفتي نسخة مطورة، يمكنني مساعدتك في التخطيط، البرمجة، أو حتى التعلم. ماذا تريد أن نفعل الآن؟";
                }

                setTimeout(() => {
                    status.style.display = 'none';
                    addMsg(response, 'ai');
                }, 1000);

            } catch (error) {
                status.style.display = 'none';
                addMsg("عذراً، حدث خطأ في الاتصال بالشبكة العصبية.", 'ai');
            }
        }

        function addMsg(text, type) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
