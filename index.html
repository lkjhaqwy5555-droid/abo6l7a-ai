<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABO6L7A AI | الإصدار النهائي</title>
    <style>
        body { background: #000; color: #00ffcc; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; margin: 0; }
        #chat { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border-radius: 15px; max-width: 80%; line-height: 1.5; }
        .user { align-self: flex-start; background: #222; border-right: 3px solid #00ffcc; }
        .ai { align-self: flex-end; background: #00ffcc; color: #000; font-weight: bold; }
        .input-box { padding: 20px; background: #111; display: flex; gap: 10px; }
        input { flex: 1; background: #000; border: 1px solid #00ffcc; color: #fff; padding: 10px; border-radius: 20px; outline: none; }
        button { background: #00ffcc; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat"><div class="msg ai">نظام أبو طلحة جاهز. أرسل رسالة لتفعيل الذكاء.</div></div>
    <div class="input-box">
        <input type="text" id="in" placeholder="اسألني أي شيء..." onkeypress="if(event.key==='Enter') start()">
        <button onclick="start()">إرسال</button>
    </div>
    <script>
        async function start() {
            const input = document.getElementById('in');
            const text = input.value.trim();
            if(!text) return;

            let key = localStorage.getItem('active_key');
            if(!key) {
                key = prompt("من فضلك الصق الـ API Key الخاص بك هنا:");
                if(key) localStorage.setItem('active_key', key);
                else return;
            }

            add(text, 'user');
            input.value = "";

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });
                const data = await res.json();
                if(data.error) {
                    add("خطأ في المفتاح. سأحذفه، جرب الإرسال مرة أخرى والصق المفتاح الصحيح.", 'ai');
                    localStorage.removeItem('active_key');
                } else {
                    add(data.candidates[0].content.parts[0].text, 'ai');
                }
            } catch(e) {
                add("مشكلة في الاتصال. جرب مجدداً.", 'ai');
                localStorage.removeItem('active_key');
            }
        }
        function add(t, type) {
            const c = document.getElementById('chat');
            const d = document.createElement('div');
            d.className = `msg ${type}`;
            d.innerText = t;
            c.appendChild(d);
            c.scrollTop = c.scrollHeight;
        }
    </script>
</body>
</html>
