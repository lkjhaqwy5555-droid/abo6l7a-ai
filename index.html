<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABO6L7A AI | THE FINAL STEP</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #131314; --accent: #4285f4; }
        body { background: var(--bg); color: #e3e3e3; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 15px; border-bottom: 1px solid #333; text-align: center; color: var(--accent); font-weight: bold; }
        #chat { flex: 1; overflow-y: auto; padding: 20px 10%; display: flex; flex-direction: column; gap: 20px; }
        .row { display: flex; gap: 10px; line-height: 1.6; }
        .ai { color: #fff; }
        .user { color: var(--accent); font-weight: bold; }
        .input-area { padding: 20px 10%; background: #1e1f20; display: flex; gap: 10px; border-radius: 30px; margin: 15px; }
        input { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 1rem; }
        button { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 1.5rem; }
        pre { background: #000; padding: 10px; border-radius: 10px; overflow-x: auto; direction: ltr; }
    </style>
</head>
<body>
    <header>ABO6L7A AI v18.0</header>
    <div id="chat"><div class="row ai">أهلاً بك! لقد تم تصحيح المسار بنجاح. اسألني أي شيء الآن.</div></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="اسألني الآن..." onkeypress="if(event.key==='Enter') execute()">
        <button onclick="execute()">✦</button>
    </div>

    <script>
        const API_KEY = "AIzaSyAb6CKU42C7GKGflm7jR0SkjJ0VRv9O304"; 

        async function execute() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if(!text) return;

            add(text, 'user');
            input.value = "";
            const status = add("<i>جاري معالجة الرد...</i>", 'ai');

            try {
                // التصحيح هنا: أضفنا -latest لاسم النموذج
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${API_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });

                const data = await response.json();
                
                if(data.error) {
                    status.innerHTML = "خطأ تقني: " + data.error.message;
                } else {
                    status.innerHTML = marked.parse(data.candidates[0].content.parts[0].text);
                }
            } catch(e) {
                status.innerHTML = "عذراً، حدث خطأ في الاتصال. تأكد من أنك في متصفح Safari أو Chrome.";
            }
        }

        function add(t, cls) {
            const c = document.getElementById('chat');
            const d = document.createElement('div');
            d.className = `row ${cls}`;
            d.innerHTML = t;
            c.appendChild(d);
            c.scrollTop = c.scrollHeight;
            return d;
        }
    </script>
</body>
</html>
