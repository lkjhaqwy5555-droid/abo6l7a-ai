<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABO6L7A AI | THE FINAL SOLUTION</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; margin-bottom: 80px; }
        .msg { padding: 12px 18px; border-radius: 20px; max-width: 85%; line-height: 1.6; }
        .user { align-self: flex-start; background: #222; border-right: 3px solid #4285f4; }
        .ai { align-self: flex-end; background: #4285f4; color: #fff; font-weight: bold; }
        .input-area { position: fixed; bottom: 20px; left: 20px; right: 20px; display: flex; gap: 10px; background: #111; padding: 10px; border-radius: 30px; border: 1px solid #333; }
        input { flex: 1; background: transparent; border: none; color: #fff; padding: 10px; outline: none; }
        button { background: #4285f4; border: none; color: white; padding: 10px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="chat"><div class="msg ai">النظام متصل الآن. من فضلك استخدم Safari أو Chrome حصراً.</div></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="اكتب سؤالك هنا..." onkeypress="if(event.key==='Enter') startChat()">
        <button onclick="startChat()">إرسال</button>
    </div>

    <script>
        // مفتاحك الذي يظهر في الصور
        const MY_KEY = "AIzaSyAb6CKU42C7GKGflm7jR0SkjJ0VRv9O304"; 

        async function startChat() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if(!text) return;

            addMsg(text, 'user');
            input.value = "";
            const status = addMsg("جاري التفكير...", 'ai');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${MY_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });

                const data = await response.json();
                if(data.error) {
                    status.innerHTML = "خطأ في الاتصال: " + data.error.message;
                } else {
                    status.innerHTML = marked.parse(data.candidates[0].content.parts[0].text);
                }
            } catch (err) {
                status.innerHTML = "خطأ: تأكد من أنك لا تستخدم متصفح Aloha أو VPN.";
            }
        }

        function addMsg(t, cls) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = `msg ${cls}`;
            div.innerHTML = t;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
