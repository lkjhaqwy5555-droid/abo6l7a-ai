<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABO6L7A AI | THE CREATOR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { --neon: #00ffcc; --bg: #050505; --panel: #111; }
        body { background: var(--bg); color: var(--neon); font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; }
        
        /* الجانب الأيمن: واجهة التحكم */
        .control-panel { width: 400px; border-left: 1px solid var(--neon); display: flex; flex-direction: column; background: #000; z-index: 10; }
        header { padding: 20px; border-bottom: 2px solid var(--neon); text-align: center; font-weight: bold; letter-spacing: 2px; }
        #terminal { flex: 1; padding: 15px; overflow-y: auto; font-family: monospace; font-size: 0.9rem; }
        .input-area { padding: 20px; border-top: 1px solid #333; display: flex; flex-direction: column; gap: 10px; }
        input { background: transparent; border: 1px solid var(--neon); color: #fff; padding: 12px; border-radius: 5px; outline: none; }
        button { background: var(--neon); color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 5px; }

        /* الجانب الأيسر: منطقة التنفيذ (العالم الحقيقي) */
        .execution-zone { flex: 1; position: relative; background: #1a1a1a; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #preview-frame { width: 95%; height: 90%; background: #fff; border-radius: 10px; border: 5px solid #333; display: none; overflow: auto; position: relative; }
        .placeholder-text { color: #444; font-size: 2rem; text-transform: uppercase; letter-spacing: 10px; }

        .log-entry { margin-bottom: 10px; padding: 5px; border-right: 2px solid var(--neon); }
        .system-info { color: #888; font-size: 0.75rem; }
    </style>
</head>
<body>

    <div class="execution-zone" id="execZone">
        <div class="placeholder-text" id="placeholder">Waiting for Creation Command...</div>
        <div id="preview-frame"></div>
    </div>

    <div class="control-panel">
        <header>ABO6L7A AI v3.0 [ULTIMATE]</header>
        <div id="terminal">
            <div class="log-entry">نظام الخلق جاهز. بانتظار إحداثيات المشروع القادم.</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="اطلب: اصنع موقع، اصنع عالم، اصنع لعبة..." autofocus>
            <button onclick="masterExecute()">تفعيل بروتوكول الخلق</button>
        </div>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const frame = document.getElementById('preview-frame');
        const placeholder = document.getElementById('placeholder');

        function log(msg, type="info") {
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.innerHTML = `<div class="system-info">[SYS_LOG: ${new Date().toLocaleTimeString()}]</div><div>${msg}</div>`;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function masterExecute() {
            const cmd = document.getElementById('userInput').value;
            if(!cmd) return;

            log(`جاري تحليل الطلب: "${cmd}"...`, "cmd");
            
            // محاكاة ذكاء المعالجة
            setTimeout(() => {
                if(cmd.includes("موقع")) {
                    buildWebsite();
                } else if(cmd.includes("عالم") || cmd.includes("فيديو")) {
                    createWorld();
                } else {
                    log("الأمر غير مدرج في بروتوكولات الخلق المباشرة. جاري البحث في السحابة...");
                }
            }, 1000);
            
            document.getElementById('userInput').value = '';
        }

        function buildWebsite() {
            log("تنبيه: تم تفعيل محرك الويب (WebForge v1.0)...");
            log("جاري حجز مساحة في الذاكرة الرامية (Virtual RAM)...");
            log("جاري حقن أكواد CSS و HTML التفاعلية...");
            
            setTimeout(() => {
                placeholder.style.display = 'none';
                frame.style.display = 'block';
                // هنا نقوم بصنع موقع حقيقي داخل النافذة!
                frame.innerHTML = `
                    <div style="padding:50px; font-family:sans-serif; text-align:center; color:#333;">
                        <h1 style="color:#00ffcc; background:#000; padding:20px;">موقع تم إنشاؤه بواسطة ABO6L7A AI</h1>
                        <p>هذا الموقع حي الآن داخل بيئتك المعزولة.</p>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:30px;">
                            <div style="border:1px solid #ddd; padding:20px;">قسم الخدمات</div>
                            <div style="border:1px solid #ddd; padding:20px;">قسم تواصل معنا</div>
                        </div>
                        <button style="margin-top:20px; padding:10px 20px;">اضغط للتفاعل</button>
                    </div>
                `;
                log("تم إنشاء الموقع بنجاح. البيانات: [Status: Active, Port: 8080]");
            }, 2000);
        }

        function createWorld() {
            log("تفعيل محرك العوالم (Aether Engine)...");
            log("توليد التضاريس والظلال...");
            setTimeout(() => {
                placeholder.style.display = 'none';
                frame.style.display = 'block';
                frame.innerHTML = `<div style="height:100%; background:linear-gradient(to bottom, #1e3c72, #2a5298); display:flex; align-items:center; justify-content:center; color:white; font-size:2rem;">
                    [عالم افتراضي ثلاثي الأبعاد قيد الرندر...]
                </div>`;
                log("تم بناء العالم. يمكنك الآن استكشاف الإحداثيات.");
            }, 2500);
        }
    </script>
</body>
</html>
