<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABO6L7A AI v10.0 | NEURAL GENESIS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { --neon: #00ffcc; --bg: #020202; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 15px; background: #000; border-bottom: 2px solid var(--neon); text-align: center; color: var(--neon); font-weight: bold; box-shadow: 0 0 20px var(--neon); }
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 15px; border-radius: 20px; max-width: 80%; line-height: 1.5; font-size: 1rem; animation: pop 0.3s ease; }
        .user { align-self: flex-start; background: rgba(255,255,255,0.1); border-right: 4px solid var(--neon); }
        .ai { align-self: flex-end; background: var(--neon); color: #000; font-weight: bold; }
        .input-area { padding: 20px; background: #000; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; background: #111; border: 1px solid var(--neon); color: #fff; padding: 15px; border-radius: 30px; outline: none; }
        button { background: var(--neon); color: #000; border: none; padding: 0 25px; border-radius: 30px; font-weight: bold; cursor: pointer; }
        @keyframes pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <header>ABO6L7A AI v10.0 (المحرك الحقيقي)</header>
    <div id="chat-window">
        <div class="msg ai">نظام الذكاء متصل.. بانتظار إدخال مفتاح الـ API الخاص بك للبدء.</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="اكتب رسالتك هنا..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">إرسال</button>
    </div>

    <script>
        let apiKey = ""; // سيتم طلبه من المستخدم لمرة واحدة

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            // طلب المفتاح إذا لم يكن موجوداً
            if (!apiKey) {
                apiKey = prompt("من فضلك أدخل API Key الخاص بك لتفعيل الذكاء:");
                if (!apiKey) return;
            }

            addMsg(text, 'user');
            input.value = "";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                addMsg(aiText, 'ai');
            } catch (error) {
                addMsg("خطأ: تأكد من صحة الـ API Key الخاص بك.", 'ai');
            }
        }

        function addMsg(text, type) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }
    </script>
</body>
</html>
