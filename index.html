<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABO6L7A AI | THE FIX</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #0f0f0f; --accent: #4285f4; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; overflow-y: auto; padding: 20px 10%; display: flex; flex-direction: column; gap: 20px; }
        .msg { padding: 15px; border-radius: 15px; line-height: 1.6; max-width: 85%; }
        .u { align-self: flex-start; background: #333; }
        .a { align-self: flex-end; background: var(--accent); }
        .input-hub { padding: 20px 10%; background: #111; display: flex; gap: 10px; }
        input { flex: 1; background: #222; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 25px; outline: none; }
        button { background: var(--accent); border: none; padding: 0 25px; border-radius: 25px; color: #fff; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="chat"><div class="msg a">تم كسر الجدار الأمني. أنا متصل الآن.</div></div>
    <div class="input-hub">
        <input type="text" id="userInput" placeholder="اسألني الآن..." onkeypress="if(event.key==='Enter') solve()">
        <button onclick="solve()">إرسال</button>
    </div>

    <script>
        const API_KEY = "AIzaSyAb6CKU42C7GKGflm7jR0SkjJ0VRv9O304"; 

        async function solve() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if(!text) return;

            addMsg(text, 'u');
            input.value = "";
            const status = addMsg("جاري الاتصال...", 'a');

            try {
                // استخدام الرابط المباشر للموديل المستقر (Flash) بدون إضافات "latest"
                // هذا الرابط هو الوحيد الذي يقبله v1beta حالياً بدون أخطاء "Model not found"
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }]
                    })
                });

                const data = await response.json();

                if (data.candidates && data.candidates[0].content) {
                    status.innerHTML = marked.parse(data.candidates[0].content.parts[0].text);
                } else {
                    // في حال وجود خطأ من جوجل، سنظهره لك لنعرف السبب بدقة
                    status.innerHTML = "حدث خطأ: " + (data.error ? data.error.message : "استجابة غير متوقعة");
                }
            } catch (err) {
                status.innerHTML = "فشل الاتصال. يرجى تجربة متصفح Chrome أو Safari وإغلاق الـ VPN.";
            }
        }

        function addMsg(t, cls) {
            const c = document.getElementById('chat');
            const d = document.createElement('div');
            d.className = `msg ${cls}`;
            d.innerHTML = t;
            c.appendChild(d);
            c.scrollTop = c.scrollHeight;
            return d;
        }
    </script>
</body>
</html>
